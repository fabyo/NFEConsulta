name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore NFEConsulta.sln

      - name: Build
        run: dotnet build NFEConsulta.sln -c Release --no-restore

      - name: Pack
        run: dotnet pack NFEConsulta.sln -c Release --no-build -o ./artifacts

      - name: Generate SBOM (CycloneDX)
        run: |
          dotnet tool install --global CycloneDX
          dotnet-CycloneDX NFEConsulta.sln -o ./artifacts --json

      - name: Upload SBOM as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: ./artifacts/bom.json

      - name: NuGet Login
        uses: NuGet/login@v1
        id: login
        with:
          user: fabyoguima

      - name: Publish
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
