name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore NFEConsulta.sln

      - name: Build
        run: dotnet build NFEConsulta.sln -c Release --no-restore

      - name: Tests
        run: dotnet test NFEConsulta.sln -c Release --no-build

      - name: Pack
        run: |
          dotnet pack src/NFEConsulta.Core/NFEConsulta.Core.csproj -c Release --no-build -o ./artifacts
          dotnet pack src/NFEConsulta.Cli/NFEConsulta.Cli.csproj -c Release --no-build -o ./artifacts

      - name: Generate SBOM (CycloneDX)
        run: |
          dotnet tool install --global CycloneDX --version 6.2.0
          dotnet-CycloneDX NFEConsulta.sln -o ./artifacts --json

      - name: Upload SBOM as Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: ./artifacts/bom.json

      - name: NuGet Login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: login
        with:
          user: fabyoguima

      - name: Publish
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
