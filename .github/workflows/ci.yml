name: Build & Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore NFEConsulta.sln

      - name: Format check
        run: dotnet format NFEConsulta.sln --verify-no-changes

      - name: Build
        run: dotnet build NFEConsulta.sln --configuration Release --no-restore

      - name: Tests
        run: dotnet test NFEConsulta.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --logger trx --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: warn
