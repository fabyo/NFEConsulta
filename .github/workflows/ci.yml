name: Build & Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore NFEConsulta.sln

      - name: Format check
        run: dotnet format NFEConsulta.sln --verify-no-changes

      - name: Build
        run: dotnet build NFEConsulta.sln --configuration Release --no-restore

      - name: Tests
        run: dotnet run --project tests\NFEConsulta.Tests\NFEConsulta.Tests.csproj --configuration Release
