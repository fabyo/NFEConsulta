name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-nuget:
    name: Publish NuGet packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore NFEConsulta.sln

      - name: Build
        run: dotnet build NFEConsulta.sln --configuration Release --no-restore

      - name: Pack Core
        run: dotnet pack src/NFEConsulta.Core/NFEConsulta.Core.csproj --configuration Release --no-build --output artifacts/packages

      - name: Pack CLI
        run: dotnet pack src/NFEConsulta.Cli/NFEConsulta.Cli.csproj --configuration Release --no-build --output artifacts/packages

      - name: Publish to NuGet
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
